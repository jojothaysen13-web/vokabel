<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>📞 AGENT PHONE — Operation Doppelgänger</title>
<style>
  :root{
    --bg1:#0b1026; --bg2:#161b3c; --bg3:#241852;
    --neon:#22e6c8; --neon2:#39ff88; --accent:#ff8a3d; --pink:#ff4d8d;
    --gold:#ffd54a; --bad:#ff4d5e; --good:#39ff88;
    --card:rgba(255,255,255,.07); --cardbr:rgba(255,255,255,.16);
    --txt:#eaf2ff; --muted:#9fb0d9;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
    color:var(--txt);
    background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    background-size:300% 300%;
    animation:bgmove 18s ease infinite;
    overflow:hidden;
  }
  @keyframes bgmove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

  #fx{position:fixed;inset:0;pointer-events:none;z-index:50;}

  #app{position:relative;height:100dvh;display:flex;flex-direction:column;max-width:760px;margin:0 auto;}

  /* HUD */
  #hud{
    display:none;gap:8px;padding:10px 14px;align-items:center;flex-wrap:wrap;
    background:rgba(0,0,0,.25);backdrop-filter:blur(6px);border-bottom:1px solid var(--cardbr);
  }
  .hud-chip{display:flex;align-items:center;gap:6px;font-weight:700;font-size:14px;
    background:var(--card);border:1px solid var(--cardbr);padding:6px 10px;border-radius:999px;}
  #xpwrap{flex:1;min-width:120px;height:14px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden;border:1px solid var(--cardbr);position:relative;}
  #xpbar{height:100%;width:0%;background:linear-gradient(90deg,var(--neon),var(--neon2));transition:width .5s cubic-bezier(.2,.9,.2,1);}
  #xptxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;letter-spacing:.5px;}
  .hearts{letter-spacing:2px;font-size:16px;}
  #soundBtn{cursor:pointer;}

  /* Screen */
  #screen{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;}
  .center{margin:auto;width:100%;text-align:center;}

  h1.title{font-size:34px;margin:0 0 4px;line-height:1.05;
    background:linear-gradient(90deg,var(--neon),var(--accent),var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 30px rgba(34,230,200,.25);letter-spacing:1px;}
  .subtitle{color:var(--muted);margin:0 0 18px;font-size:15px;}

  .panel{background:var(--card);border:1px solid var(--cardbr);border-radius:20px;padding:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);backdrop-filter:blur(10px);}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
    font-size:18px;font-weight:800;cursor:pointer;border:none;border-radius:16px;
    padding:15px 22px;color:#06121a;
    background:linear-gradient(135deg,var(--neon),var(--neon2));
    box-shadow:0 8px 22px rgba(34,230,200,.35);transition:transform .08s, box-shadow .2s;
    width:100%;margin-top:10px;}
  .btn:active{transform:translateY(2px) scale(.99);}
  .btn.alt{color:var(--txt);
    background:linear-gradient(135deg,#34407f,#222a55);box-shadow:0 8px 22px rgba(0,0,0,.3);}
  .btn.ghost{background:transparent;border:1px solid var(--cardbr);color:var(--muted);box-shadow:none;font-size:14px;padding:10px 16px;}
  .btn.mini{width:auto;padding:10px 14px;font-size:14px;margin-top:8px;flex:1;}

  .story{color:#d7e2ff;font-size:16px;line-height:1.5;margin:14px 0;text-align:left;}
  .badge{display:inline-block;background:var(--accent);color:#2a1400;font-weight:800;
    padding:4px 12px;border-radius:999px;font-size:13px;margin-bottom:8px;}

  /* Cast (Charaktere) */
  .castRow{display:flex;justify-content:space-around;gap:6px;margin:16px 0;}
  .cast{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;color:var(--muted);text-align:center;line-height:1.15;font-weight:700;}
  .castEmo{font-size:34px;filter:drop-shadow(0 0 9px rgba(34,230,200,.45));animation:bob 2.6s ease-in-out infinite;}
  .cast:nth-child(2) .castEmo{animation-delay:.3s}
  .cast:nth-child(3) .castEmo{animation-delay:.6s}
  .cast:nth-child(4) .castEmo{animation-delay:.9s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

  /* Dialog-Szene */
  .scene{display:flex;gap:14px;align-items:flex-start;text-align:left;
    background:var(--card);border:1px solid var(--cardbr);border-radius:20px;padding:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);backdrop-filter:blur(10px);animation:fadeUp .35s;}
  .scene.mine{flex-direction:row-reverse;text-align:right;}
  .avatar{font-size:54px;filter:drop-shadow(0 0 14px var(--cc));animation:bob 2.2s ease-in-out infinite;flex:none;}
  .bubbleWrap{flex:1;min-width:0;}
  .speaker{font-weight:900;font-size:14px;letter-spacing:.5px;margin-bottom:5px;}
  .bubble{font-size:17px;line-height:1.5;color:#eaf2ff;min-height:50px;}
  .sceneBtns{display:flex;gap:10px;margin-top:14px;}
  .sceneBtns .btn{margin-top:0;}
  .dlgDots{display:flex;gap:6px;justify-content:center;margin-top:12px;}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.22);transition:background .2s;}
  .dot.on{background:var(--neon);box-shadow:0 0 8px var(--neon);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  /* Mission map */
  .missionList{display:grid;gap:12px;margin-top:8px;}
  .missionCard{display:flex;align-items:center;gap:14px;text-align:left;cursor:pointer;
    background:var(--card);border:1px solid var(--cardbr);border-radius:16px;padding:14px;transition:transform .12s,border-color .2s;}
  .missionCard:active{transform:scale(.98);}
  .missionCard.locked{opacity:.45;cursor:not-allowed;}
  .missionCard.done{border-color:var(--neon2);}
  .missionCard.train{border-color:var(--gold);}
  .missionEmoji{font-size:34px;flex:none;}
  .missionInfo b{font-size:17px;}
  .missionInfo small{color:var(--muted);display:block;}
  .missionState{margin-left:auto;font-size:22px;}

  /* Methoden-Pills + Badges */
  .methodRow{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0;}
  .mpill{font-size:11px;font-weight:800;background:var(--card);border:1px solid var(--cardbr);
    border-radius:999px;padding:5px 11px;color:var(--neon);}
  .badgeRow{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0;}
  .bChip{font-size:12px;font-weight:800;background:rgba(255,213,74,.12);border:1px solid var(--gold);
    border-radius:999px;padding:5px 11px;color:var(--gold);}

  /* Flashcards */
  .cardGrid{display:grid;grid-template-columns:1fr;gap:12px;margin:12px 0;}
  .flash{perspective:1000px;cursor:pointer;height:96px;}
  .flashInner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;}
  .flash.flipped .flashInner{transform:rotateY(180deg);}
  .flashFace{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:10px;
    backface-visibility:hidden;border-radius:16px;padding:12px;text-align:center;font-weight:700;font-size:18px;border:1px solid var(--cardbr);}
  .flashFront{background:linear-gradient(135deg,#1f2b66,#2b1d63);}
  .flashBack{background:linear-gradient(135deg,#0f3d3a,#13513f);transform:rotateY(180deg);color:#d7ffef;}
  .flashFlag{position:absolute;top:8px;left:12px;font-size:12px;color:var(--muted);font-weight:800;letter-spacing:.5px;}
  .speakBtn{position:absolute;top:6px;right:10px;font-size:18px;background:none;border:none;cursor:pointer;color:#fff;opacity:.8;}

  /* Question / Tasks */
  .qHead{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:13px;font-weight:700;margin-bottom:6px;gap:10px;}
  .qHead .exit{cursor:pointer;color:var(--accent);}
  #timerWrap{height:8px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden;margin-bottom:16px;}
  #timerBar{height:100%;width:100%;background:linear-gradient(90deg,var(--neon2),var(--gold),var(--accent));transition:width .1s linear;}
  .qPrompt{font-size:13px;color:var(--neon);font-weight:800;letter-spacing:.5px;margin-bottom:6px;}
  .qWord{font-size:26px;font-weight:800;line-height:1.2;margin:6px 0 4px;}
  .qDir{color:var(--muted);font-size:13px;margin-bottom:18px;}
  .options{display:grid;gap:11px;}
  .opt{font-size:17px;font-weight:700;text-align:left;cursor:pointer;color:var(--txt);
    background:var(--card);border:1px solid var(--cardbr);border-radius:14px;padding:15px 16px;transition:transform .08s,background .2s,border-color .2s;}
  .opt:active{transform:scale(.99);}
  .opt.correct{background:linear-gradient(135deg,#127a3e,#1faa57);border-color:var(--good);animation:pop .35s;}
  .opt.wrong{background:linear-gradient(135deg,#8a1f2c,#c0303f);border-color:var(--bad);}
  .opt.dim{opacity:.45;}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}

  .listenBig{font-size:48px;margin:8px 0;}

  /* Satz-Puzzle */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;min-height:30px;}
  .chip{cursor:pointer;background:linear-gradient(135deg,#2b3a7a,#23306b);border:1px solid var(--cardbr);
    border-radius:12px;padding:10px 14px;font-weight:800;font-size:17px;color:var(--txt);transition:transform .08s;}
  .chip:active{transform:scale(.93);}
  .answerLine{min-height:56px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;
    background:rgba(0,0,0,.22);border:1px dashed var(--cardbr);border-radius:14px;padding:10px;margin:10px 0;}
  .answerLine .chip.in{background:linear-gradient(135deg,#127a3e,#1faa57);}
  .ph{color:var(--muted);font-weight:600;}
  .rowBtns{display:flex;gap:10px;}

  /* Tippen */
  input.tin{width:100%;font-size:19px;padding:14px;border-radius:14px;border:1px solid var(--cardbr);
    background:rgba(0,0,0,.25);color:var(--txt);font-weight:700;outline:none;margin:10px 0;}
  input.tin:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(34,230,200,.18);}
  .hintRow{display:flex;gap:10px;}

  /* Memory */
  .memGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;}
  .memCard{min-height:74px;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;
    border-radius:14px;border:1px solid var(--cardbr);font-weight:700;font-size:13px;cursor:pointer;
    transition:transform .1s,opacity .25s;background:linear-gradient(135deg,#34407f,#222a55);}
  .memCard.down{font-size:26px;}
  .memCard.face{background:linear-gradient(135deg,#0f3d3a,#13513f);}
  .memCard.matched{opacity:.32;cursor:default;border-color:var(--neon2);}
  .memCard:active{transform:scale(.97);}

  .shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}

  .feedback{min-height:26px;margin-top:14px;font-weight:800;font-size:16px;}
  .combo{position:fixed;left:50%;top:28%;transform:translateX(-50%);font-size:40px;font-weight:900;
    color:var(--gold);text-shadow:0 0 20px rgba(255,213,74,.6);pointer-events:none;opacity:0;z-index:60;text-align:center;}
  .combo.show{animation:comboAnim 1s ease;}
  @keyframes comboAnim{0%{opacity:0;transform:translateX(-50%) scale(.4)}30%{opacity:1;transform:translateX(-50%) scale(1.1)}100%{opacity:0;transform:translateX(-50%) translateY(-40px) scale(1)}}

  .statRow{display:flex;justify-content:space-around;margin:18px 0;}
  .stat b{font-size:26px;display:block;}
  .stat small{color:var(--muted);}
  .ranklabel{font-size:24px;font-weight:900;color:var(--gold);margin:6px 0;}

  /* Fortschritt (SRS) */
  .mstat{margin:10px 0 16px;}
  .mrow{display:flex;align-items:center;gap:10px;text-align:left;background:var(--card);
    border:1px solid var(--cardbr);border-radius:12px;padding:10px 12px;margin-bottom:8px;}
  .mrow .memo{font-size:18px;flex:none;}
  .mrow .minfo{flex:1;min-width:0;}
  .mrow .minfo b{font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mrow .minfo small{color:var(--muted);font-size:11px;}
  .mbar{height:7px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden;margin-top:6px;}
  .mfill{height:100%;background:linear-gradient(90deg,var(--neon),var(--neon2));border-radius:999px;transition:width .5s;}

  .footnote{color:var(--muted);font-size:12px;margin-top:14px;}
  .pulse{animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .phoneRing{display:inline-block;animation:ring 1s ease-in-out infinite;}
  @keyframes ring{0%,100%{transform:rotate(0)}10%,30%,50%{transform:rotate(-14deg)}20%,40%{transform:rotate(14deg)}}
</style>
</head>
<body>
<canvas id="fx"></canvas>
<div id="app">
  <header id="hud">
    <span class="hud-chip" id="missionChip">☎️ ECHO</span>
    <span class="hud-chip" id="skinChip" title="Dein Agenten-Look">🕵️</span>
    <span class="hud-chip">Lvl <span id="lvl">1</span></span>
    <div id="xpwrap"><div id="xpbar"></div><div id="xptxt"></div></div>
    <span class="hud-chip"><span class="hearts" id="hearts">❤️❤️❤️</span></span>
    <span class="hud-chip">🪙 <span id="coins">0</span></span>
    <span class="hud-chip">🔥 <span id="streak">0</span></span>
    <span class="hud-chip" id="soundBtn" title="Ton an/aus">🔊</span>
  </header>
  <main id="screen"></main>
</div>
<div class="combo" id="combo"></div>

<script>
/* ============================================================
   AGENT PHONE — Operation Doppelgänger
   Ein ADHS-freundliches Vokabel-Abenteuer (DE <-> EN)
   Mit Story, Charakteren und 5 Lernmethoden.
   ============================================================ */

/* ---------- Vokabeln (Nr. 35–56) ---------- */
const VOCAB = [
  {id:35, en:"Shall I put you through?",        de:"Soll ich Sie durchstellen?"},
  {id:36, en:"Can I take a message?",            de:"Kann ich eine Nachricht aufnehmen?"},
  {id:37, en:"Have you got my mobile number?",   de:"Haben Sie meine Handynummer?"},
  {id:38, en:"certainly",                        de:"sicherlich / sicher doch"},
  {id:39, en:"I'm afraid",                        de:"leider"},
  {id:40, en:"Hang on a moment",                 de:"Bleib dran"},
  {id:41, en:"... speaking",                      de:"... am Apparat"},
  {id:42, en:"This is",                           de:"Hier ist"},
  {id:43, en:"actually",                          de:"eigentlich"},
  {id:44, en:"she's unavailable",                 de:"sie ist nicht verfügbar"},
  {id:45, en:"out of the office",                 de:"außerhalb des Büros"},
  {id:46, en:"on another line",                   de:"auf einer anderen Leitung"},
  {id:47, en:"extension number",                  de:"Durchwahl"},
  {id:48, en:"I didn't catch that",               de:"Ich habe das nicht verstanden"},
  {id:49, en:"Could you please hold?",            de:"Bleiben Sie bitte dran"},
  {id:50, en:"Her line is engaged",               de:"Ihre Leitung ist besetzt"},
  {id:51, en:"I'm calling about",                 de:"Ich rufe an wegen"},
  {id:52, en:"Let me just check that",            de:"Lassen Sie mich das prüfen"},
  {id:53, en:"I just wanted to confirm",          de:"Ich wollte nur bestätigen"},
  {id:54, en:"I will call you straight back",     de:"Ich rufe Sie gleich zurück"},
  {id:55, en:"Can I call you back later?",        de:"Kann ich Sie später zurückrufen?"},
  {id:56, en:"Would you like to leave a message?",de:"Wollen Sie eine Nachricht hinterlassen?"},
];
const byId = id => VOCAB.find(v=>v.id===id) || G.custom.find(v=>v.id===id);

/* ---------- Charaktere ---------- */
const CHARS = {
  sturm:  {name:"Direktorin Sturm", emoji:"🕶️", color:"#22e6c8"},
  q:      {name:"Wendell «Q»",      emoji:"🤓", color:"#ffd54a"},
  mia:    {name:"Mia",              emoji:"💁‍♀️", color:"#ff4d8d"},
  jackal: {name:"Der Schakal",      emoji:"🦊", color:"#ff8a3d"},
  you:    {name:"Du",               emoji:"🕵️", color:"#39ff88"},
};

/* ---------- Lernmethoden ---------- */
const METHOD_INFO = {
  flash:    {icon:"🃏", name:"Karten"},
  choose:   {icon:"🎯", name:"Schnellwahl"},
  listen:   {icon:"🎧", name:"Abhören"},
  scramble: {icon:"🧩", name:"Satz-Puzzle"},
  type:     {icon:"⌨️", name:"Funkspruch"},
  memory:   {icon:"🧠", name:"Code-Memory"},
};
const METHOD_DESC = {
  choose:   "Wähle die richtige Übersetzung",
  listen:   "Hör genau hin & erkenne den Satz",
  scramble: "Bau den Satz aus den Wörtern",
  type:     "Tippe die Übersetzung selbst",
  memory:   "Finde die Paare EN ↔ DE",
};

/* ---------- Missionen (Abenteuer-Stationen) ---------- */
const MISSIONS = [
  {
    name:"Die Zentrale", emoji:"☎️", badge:"📞 Zentralen-Profi",
    ids:[35,36,37,38,40],
    methods:["choose","listen"], memory:false,
    intro:[
      {who:"sturm", text:"Pssst! Hier rüber, Rekrut. Ja, du. Willkommen bei ECHO – der geheimsten Telefonzentrale der Welt. 🤫"},
      {who:"sturm", text:"Jemand verrät unsere Geheimnisse … am Telefon. Wir nennen ihn nur: den Schakal. 🦊"},
      {who:"q",     text:"Hi! Ich bin Wendell, genannt «Q». Ich verkabel dich mit den wichtigsten Telefon-Codes. Und bitte – drück nicht den roten Knopf. 😅"},
      {who:"sturm", text:"Deine erste Aufgabe: Beweise unten in der Zentrale, dass du Anrufe annehmen und durchstellen kannst. Los!"},
    ],
    outro:[
      {who:"mia",   text:"Nicht schlecht für den ersten Tag! Ich bin Mia, Tisch nebenan. ☕"},
      {who:"sturm", text:"Sauber, Agent. Die Zentrale traut dir. Aber der Schakal ist schon weiter oben im Gebäude …"},
    ],
  },
  {
    name:"Im Büro", emoji:"🏢", badge:"🏢 Büro-Fuchs",
    ids:[41,42,43,44,45],
    methods:["choose","listen","scramble"], memory:false,
    intro:[
      {who:"sturm", text:"Etage 2. Hier rufen Leute mit Namen an und fragen nach Kollegen. Sag clever, wer gerade (nicht) erreichbar ist – sonst fliegt deine Tarnung auf."},
      {who:"q",     text:"Neu im Gepäck: das Satz-Puzzle 🧩. Bau ganze Sätze zusammen – wie ein echter Profi am Apparat."},
    ],
    outro:[
      {who:"mia",   text:"Da! Auf Leitung 3 war eben jemand mit kratziger Stimme … und hat sofort aufgelegt. 😳"},
      {who:"sturm", text:"Das war er. Der Schakal testet uns. Bleib dran, Agent."},
    ],
  },
  {
    name:"Auf der Leitung", emoji:"📞", badge:"🔌 Leitungs-Meister",
    ids:[46,47,48,49,50],
    methods:["choose","scramble","type"], memory:false,
    intro:[
      {who:"q",     text:"Die Leitungen glühen 🔥. Besetzt, Durchwahl, Rauschen. Heute schaltest du Funksprüche frei: jetzt wird getippt! ⌨️"},
      {who:"sturm", text:"Jedes Wort zählt. Verlier bloß nicht die Verbindung."},
    ],
    outro:[
      {who:"mia",   text:"Ich hab die Nummer zurückverfolgt … sie führt direkt ins Chefbüro. 😨"},
      {who:"sturm", text:"Der Schakal ist einer von uns. Heute Nacht ruft er an. Sei bereit für ALLES."},
    ],
  },
  {
    name:"Der Rückruf — FINALE", emoji:"🕵️", badge:"🦊 Schakal-Jäger",
    ids:[39,51,52,53,54,55,56],
    methods:["choose","listen","scramble","type"], memory:true,
    intro:[
      {who:"sturm", text:"Das ist es, Agent. Der Schakal ist in der Leitung. Halt ihn hin, versteh jeden Code – dann schnappen wir ihn."},
      {who:"jackal",text:"Guten Abend … Sie sind also der neue «Held». Mal sehen, ob Sie meinem Anruf folgen können. 🦊"},
      {who:"q",     text:"Volle Ausrüstung an Bord: Schnellwahl, Abhören, Satz-Puzzle, Funkspruch – und zum Schluss Code-Memory 🧠. Viel Glück!"},
    ],
    outro:[
      {who:"jackal",text:"Unmöglich … Sie haben jeden einzelnen Code geknackt!"},
      {who:"sturm", text:"Spur gesichert, Stimme aufgezeichnet. Der Schakal ist enttarnt. 🎯"},
      {who:"mia",   text:"Du hast es geschafft! Vom Praktikanten zum … schau mal auf deinen Rang. 😎"},
      {who:"sturm", text:"Willkommen im Team, Agent. ECHO ist stolz auf dich. 📞✨"},
    ],
  },
];

const RANKS = ["Praktikant","Rookie-Agent","Feld-Agent","Spezialagent","Geheimagent","Meisterspion","Phantom 📞"];
const LANGMETA = {
  en:{flag:"🇬🇧 Englisch", code:"en-GB", short:"EN"},
  de:{flag:"🇩🇪 Deutsch",  code:"de-DE", short:"DE"},
};

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function canonical(s){ return String(s).split('/')[0].replace(/\([^)]*\)/g,'').replace(/\s+/g,' ').trim(); }
/* Normalisiert für den Vergleich (Kleinschreibung, ohne Satzzeichen) */
function norm(s){ return String(s).toLowerCase().replace(/\([^)]*\)/g,'').replace(/[.,!?;:'"…]/g,'').replace(/\s+/g,' ').trim(); }
/* Levenshtein-Distanz (für tolerante Tipp-Prüfung) */
function lev(a,b){
  const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
  const d=[]; for(let i=0;i<=m;i++){d[i]=[i];} for(let j=0;j<=n;j++){d[0][j]=j;}
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){
    const c=a[i-1]===b[j-1]?0:1;
    d[i][j]=Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1]+c);
  }
  return d[m][n];
}

/* ============================================================
   FSRS — Spaced Repetition Scheduler (FSRS-5, kompakt)
   Merkt sich pro Vokabel, wie gut sie sitzt, und bringt
   schwache Codes gezielt zurück. Karte: {s,d,due,reps,lapses,last}
   ============================================================ */
const FSRS_W = [0.40255,1.18385,3.173,15.69105,7.1949,0.5345,1.4604,0.0046,
  1.54575,0.1192,1.01925,1.9395,0.11,0.29605,2.2698,0.2315,2.9898,0.51655,0.6621];
const FSRS_DECAY = -0.5;
const FSRS_FACTOR = Math.pow(0.9, 1/FSRS_DECAY) - 1; // = 19/81
const TARGET_R = 0.9;        // Ziel-Behaltensrate
const DAY = 86400000;

function clampD(d){ return Math.min(10, Math.max(1, d)); }
function initD(g){ return clampD(FSRS_W[4] - Math.exp(FSRS_W[5]*(g-1)) + 1); }
function initS(g){ return Math.max(0.1, FSRS_W[g-1]); }
function retr(s, elapsedDays){ return Math.pow(1 + FSRS_FACTOR*elapsedDays/s, FSRS_DECAY); }
function intervalDays(s){ return Math.max(1, Math.round(s/FSRS_FACTOR*(Math.pow(TARGET_R,1/FSRS_DECAY)-1))); }
function nextS_recall(d, s, r, g){
  const hard = g===2 ? FSRS_W[15] : 1;
  const easy = g===4 ? FSRS_W[16] : 1;
  return s * (1 + Math.exp(FSRS_W[8])*(11-d)*Math.pow(s,-FSRS_W[9])*(Math.exp(FSRS_W[10]*(1-r))-1)*hard*easy);
}
function nextS_lapse(d, s, r){
  return Math.min(s, FSRS_W[11]*Math.pow(d,-FSRS_W[12])*(Math.pow(s+1,FSRS_W[13])-1)*Math.exp(FSRS_W[14]*(1-r)));
}
function nextD(d, g){
  const dp = d + (-FSRS_W[6]*(g-3))*(10-d)/9;            // lineare Dämpfung
  return clampD(FSRS_W[7]*initD(4) + (1-FSRS_W[7])*dp);  // Mittelwert-Rückkehr
}
/* Ergebnis einer Vokabel einbuchen. correct/fast -> FSRS-Bewertung g */
function recordReview(id, correct, fast){
  if(id==null) return;
  const now = Date.now();
  const g = !correct ? 1 : (fast ? 4 : 3);   // 1=Again, 3=Good, 4=Easy
  let c = G.cards[id];
  if(!c){
    c = { s:initS(g), d:initD(g), due:0, reps:0, lapses:correct?0:1, last:now };
  } else {
    const elapsed = Math.max(0,(now-(c.last||now))/DAY);
    const r = retr(c.s, elapsed);
    if(correct){ c.s = nextS_recall(c.d, c.s, r, g); }
    else { c.lapses++; c.s = nextS_lapse(c.d, c.s, r); }
    c.d = nextD(c.d, g);
  }
  c.s = Math.max(0.1, c.s);
  c.reps++; c.last = now; c.due = now + intervalDays(c.s)*DAY;
  G.cards[id] = c; G.reviews++;
  saveGame();
}
/* Auswahl-Score: neu & schwach & überfällig -> hoch */
function cardScore(id, now){
  const c = G.cards[id];
  if(!c) return 1.0;
  const elapsed = Math.max(0,(now-c.last)/DAY);
  let score = 1 - retr(c.s, elapsed);
  if(c.due && now>=c.due) score += 0.3;
  if(c.lapses) score += 0.1*Math.min(3,c.lapses);
  return Math.max(0.02, score);
}
/* Gewichtete Zufallsauswahl (mehr Varianz dank ^1.5) */
function pickReviewId(pool, lastId){
  pool = pool || VOCAB.map(v=>v.id);
  const now = Date.now();
  let cand = pool.filter(id=>id!==lastId);
  if(!cand.length) cand = pool.slice();
  const w = cand.map(id=>Math.pow(cardScore(id,now),1.5));
  let roll = Math.random()*w.reduce((a,b)=>a+b,0);
  for(let i=0;i<cand.length;i++){ roll-=w[i]; if(roll<=0) return cand[i]; }
  return cand[cand.length-1];
}
/* Pool der fälligen/schwachen Codes (für Schwächen-Training) */
function weakPool(ids){
  ids = ids || VOCAB.map(v=>v.id);
  const now=Date.now();
  return ids.filter(id=>{
    const c=G.cards[id]; if(!c) return false;
    const elapsed=Math.max(0,(now-c.last)/DAY);
    return c.lapses>0 || (c.due && c.due<=now) || retr(c.s,elapsed)<0.9;
  });
}
/* Anzeige-Helfer */
function masteryPct(id){
  const c=G.cards[id]; if(!c) return 0;
  return Math.round(100*Math.min(1, Math.log(1+c.s)/Math.log(1+30))); // 30 Tage Stabilität ~ 100%
}
function masteryTag(id){
  const c=G.cards[id]; if(!c) return {emo:'⚪', label:'neu'};
  if(c.s<1)  return {emo:'🔴', label:'frisch'};
  if(c.s<4)  return {emo:'🟠', label:'am Lernen'};
  if(c.s<16) return {emo:'🟡', label:'sitzt'};
  return {emo:'🟢', label:'gemeistert'};
}

function todayStr(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
let dailyReward = null;
/* Einmal pro Kalendertag: Streak fortführen/zurücksetzen & Bonus gutschreiben */
function claimDailyLogin(){
  const today = todayStr();
  if(G.lastLoginDate === today) return;
  const yesterday = todayStr(new Date(Date.now()-DAY));
  G.loginStreak = (G.lastLoginDate===yesterday) ? G.loginStreak+1 : 1;
  G.longestLoginStreak = Math.max(G.longestLoginStreak||0, G.loginStreak);
  G.lastLoginDate = today;
  const cycleDay = ((G.loginStreak-1)%7)+1; // 1..7, wiederholt sich
  const coins = 10 + cycleDay*8;
  awardCoins(coins);
  saveGame();
  dailyReward = {streak:G.loginStreak, cycleDay, coins};
  checkAchievements();
}

let soundOn = true, actx=null;
function audio(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
function beep(freq, dur=0.12, type='sine', vol=0.2, when=0){
  if(!soundOn) return; const ac=audio(); if(!ac) return;
  const t=ac.currentTime+when;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+dur+0.02);
}

    const clean = String(text).replace(/\.\.\./g,'').replace(/\s*\/\s*/g,', ');

/* ---------- Konfetti ---------- */
const cv = document.getElementById('fx'), ctx = cv.getContext('2d');
let parts = [];
function resize(){ cv.width=innerWidth; cv.height=innerHeight; }
resize(); addEventListener('resize', resize);
function burst(x,y,n=26,colors=['#22e6c8','#39ff88','#ffd54a','#ff8a3d','#ff4d8d']){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=2+Math.random()*6;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,g:0.18,life:60+Math.random()*30,
      c:colors[Math.floor(Math.random()*colors.length)], s:4+Math.random()*5, rot:Math.random()*6, vr:(-.3+Math.random()*.6)});
  }
}
function tick(){
  ctx.clearRect(0,0,cv.width,cv.height);
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life--;
    if(p.life<=0||p.y>cv.height+40){parts.splice(i,1);continue;}
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.globalAlpha=Math.min(1,p.life/30);
    ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*1.5); ctx.restore();
  }
  requestAnimationFrame(tick);
}
tick();

  G.xp += amount;
  let leveled=false;
  while(G.xp >= xpForLevel(G.level)){ G.xp -= xpForLevel(G.level); G.level++; leveled=true; }
  if(leveled){ S.levelup(); burst(innerWidth/2, innerHeight*0.3, 50); showCombo('LEVEL UP! ⭐ '+rankFor(G.level)); }

}

function showDialogue(lines, onDone){

function renderDlgLine(){
  const line = dlg.lines[dlg.i];
  const c = CHARS[line.who] || CHARS.sturm;
  const mine = line.who==='you';
  const last = dlg.i >= dlg.lines.length-1;
  screen.innerHTML = `
    <div class="center" style="max-width:600px">
      <div class="scene ${mine?'mine':''}" id="scene">
        <div class="avatar" style="--cc:${c.color}">${c.emoji}</div>
        <div class="bubbleWrap">
          <div class="speaker" style="color:${c.color}">${esc(c.name)}</div>

        </div>
      </div>
      <div class="sceneBtns">
        <button class="btn" id="next">${last?'➡️ Weiter':'Weiter ▶'}</button>
        <button class="btn ghost" id="skip" style="flex:none">⏭️</button>
      </div>
      <div class="dlgDots">${dlg.lines.map((_,k)=>`<span class="dot ${k===dlg.i?'on':''}"></span>`).join('')}</div>
    </div>`;
  S.ring();
  typeLine(document.getElementById('bub'), line.text);
  const advance = ()=>{
    if(dlg && dlg.typing){ finishType(); return; }
    if(!dlg) return;
    dlg.i++;
    if(dlg.i >= dlg.lines.length){ const done=dlg.onDone; dlg=null; done && done(); }
    else { S.click(); renderDlgLine(); }
  };
  document.getElementById('next').onclick = advance;
  document.getElementById('scene').onclick = ()=>{ if(dlg && dlg.typing) finishType(); };
  document.getElementById('skip').onclick = ()=>{ const done=dlg?dlg.onDone:null; dlg=null; clearInterval(typeInt); S.click(); done && done(); };
}
function typeLine(el, text){
  clearInterval(typeInt); dlg.typing=true; let i=0; el.textContent=''; el._full=text;
  typeInt = setInterval(()=>{
    if(!dlg){ clearInterval(typeInt); return; }
    el.textContent = text.slice(0, ++i);
    if(i>=text.length){ clearInterval(typeInt); dlg.typing=false; }
  }, 16);
}
function finishType(){
  clearInterval(typeInt);
  const el=document.getElementById('bub');
  if(el && dlg){ el.textContent = el._full||el.textContent; dlg.typing=false; }
}

/* ============================================================

   ============================================================ */
function parseCustomLine(line){
  line = line.replace(/\r$/,'').trim();
  if(!line) return null;
  const seps = ['\t',';','=',' - ','–',':'];
  for(const sep of seps){
    const idx = line.indexOf(sep);
    if(idx>0){
      const a=line.slice(0,idx).trim(), b=line.slice(idx+sep.length).trim();
      if(a && b) return {en:a, de:b};
    }
  }
  return null;
}
function addCustomFromText(text){
  let added=0, skipped=0;
  String(text||'').split('\n').forEach(line=>{
    if(!line.trim()) return;
    const pair = parseCustomLine(line);
    if(pair){ G.custom.push({id:newCustomId(), en:pair.en, de:pair.de}); added++; }
    else skipped++;
  });
  if(added) saveGame();
  return {added, skipped};
}
function deleteCustomWord(id){
  G.custom = G.custom.filter(v=>v.id!==id);
  delete G.cards[id];
  saveGame();
}
function clearAllCustom(){
  G.custom.forEach(v=>{ delete G.cards[v.id]; });
  G.custom = [];
  saveGame();
}

/* ============================================================
   MISSION-ENGINE
   ============================================================ */
function buildTasks(m){
  const recog = m.methods.filter(x=>x==='choose'||x==='listen');
  const prod  = m.methods.filter(x=>x==='scramble'||x==='type');
  const tasks=[];
  m.ids.forEach((id,idx)=>{
    if(recog.length){
      const meth=recog[idx%recog.length];
      tasks.push(meth==='choose'
        ? {method:'choose', id, dir: idx%2 ? 'de2en':'en2de'}
        : {method:'listen', id, heardLang: idx%2 ? 'de':'en'});
    }
    if(prod.length){
      let meth=prod[idx%prod.length];
      const produce = idx%2 ? 'en':'de';
      const words = canonical(byId(id)[produce]).split(/\s+/).length;
      if(meth==='type' && words>3) meth='scramble'; // lange Sätze lieber puzzeln
      tasks.push({method:meth, id, produce});
    }
  });
  const out = shuffle(tasks);
  if(m.memory){ out.push({method:'memory', ids: m.ids.slice(0, Math.min(6, m.ids.length))}); }
  return out;
}

function startMission(i){
  const m=MISSIONS[i];
  M = { i, m, tasks:buildTasks(m), t:0, lives:4, maxLives:5, streak:0, correct:0, total:0, mistakes:0, training:false };
  M.total = M.tasks.length;
  hud.style.display='flex'; updateHUD();
  nextTask();
}

function nextTask(){
  if(!M) return;
  if(M.t >= M.tasks.length) return missionDebrief();
  renderTask(M.tasks[M.t]);
}

function renderTask(task){
  clearInterval(timerInt); answered=false; updateHUD();
  M.curId = task.id; M.curMethod = task.method;   // für SRS-Buchung
  if(task.method==='choose')        renderChoose(task);
  else if(task.method==='listen')   renderListen(task);
  else if(task.method==='scramble') renderScramble(task);
  else if(task.method==='type')     renderType(task);
  else if(task.method==='memory')   renderMemory(task);
  if(M.training) appendTrainExit();
}
function appendTrainExit(){
  const c=screen.querySelector('.center'); if(!c) return;
  const b=document.createElement('button');
  b.className='btn ghost'; b.textContent='🚪 Training beenden'; b.style.marginTop='14px';
  b.onclick=()=>{ S.click(); const wasCustom=M&&M.custom; M=null; wasCustom?showCustomVocab():showMap(); };
  c.appendChild(b);
}

/* Belohnung / Strafe */
function registerCorrect(anchorEl, fast){
  M.correct++; M.streak++;
  if(M.streak>G.bestStreak){ G.bestStreak=M.streak; }
  if(!M.training && M.streak%5===0 && M.lives<M.maxLives){ M.lives++; showCombo('+1 ❤️ BONUS-LEBEN!'); }
  const mult = M.streak>=8 ? 3 : M.streak>=4 ? 2 : 1;
  const coins=(6+(fast?6:0))*mult, xp=(10+(fast?6:0))*mult;
  awardCoins(coins); S.correct();
  if(anchorEl){ const r=anchorEl.getBoundingClientRect(); burst(r.left+r.width/2, r.top+r.height/2, 22); }
  else burst(innerWidth/2, innerHeight*0.4, 22);
  if(mult>1 && M.streak%5!==0) showCombo('COMBO x'+mult+' 🔥');
  addXP(xp);
  checkAchievements();
  return {coins,xp,mult};
}
function registerWrong(){
  M.streak=0; if(!M.training) M.lives--; M.mistakes++; S.wrong(); saveGame(); updateHUD();
}

/* Ergebnis verarbeiten (für choose/listen/scramble/type) */
function resolve(correct, anchorEl, answerText, fast){
  if(answered) return; answered=true; clearInterval(timerInt);
  if(M && M.curMethod!=='memory') recordReview(M.curId, correct, fast);
  const fb=document.getElementById('fb');
  if(correct){
    const r=registerCorrect(anchorEl, fast);
    if(fb) fb.innerHTML = `<span style="color:var(--good)">✅ Treffer! +${r.xp} XP · +${r.coins} 🪙 ${r.mult>1?'(x'+r.mult+'!)':''}</span>`;
    advance(950);
  } else {
    registerWrong();
    if(fb) fb.innerHTML = `<span style="color:var(--bad)">❌ Richtig: <b>${esc(answerText)}</b></span>`;
    const p=document.getElementById('qpanel')||document.querySelector('.panel');
    if(p){ p.classList.add('shake'); setTimeout(()=>p.classList.remove('shake'),420); }
    if(!M.training && M.lives<=0){
      if(G.inv.life>0){
        G.inv.life--; M.lives=1; saveGame(); updateHUD();
        showCombo('🛟 Rettungsanker eingesetzt!');
        advance(1700);
        return;
      }
      setTimeout(missionFailed, 1300); return;
    }
    advance(1550);
  }
}
function advance(delay){
  setTimeout(()=>{
    if(!M) return;
    if(M.training){ M.solved++; trainNext(); }
    else { M.t++; nextTask(); }
  }, delay);
}

function taskHeader(label){
  const right = M.training ? ('#'+(M.solved+1)) : ((M.t+1)+'/'+M.total);
  return `<div class="qHead"><span>${M.m?M.m.emoji+' ':''}${label} · ${right}</span><span>🔥 Combo: ${M.streak}</span></div>`;
}

/* ---------- Timer (nur Schnellwahl & Abhören) ---------- */
let timerInt=null, timeLeft=0; const TIME_MAX=13;
function startTimer(onEnd){
  timeLeft=TIME_MAX; const bar=document.getElementById('timerBar'); if(bar){ bar.style.width='100%'; bar.style.filter='none'; }
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    timeLeft -= 0.1;
    const b=document.getElementById('timerBar');
    if(b){ b.style.width=Math.max(0,(timeLeft/TIME_MAX)*100)+'%'; if(timeLeft<=3) b.style.filter='hue-rotate(-40deg)'; }
    if(timeLeft<=0){ clearInterval(timerInt); onEnd(); }
  },100);
}
function lockChoose(ans, chosen){
  document.querySelectorAll('#opts .opt').forEach(b=>{
    if(b.textContent===ans) b.classList.add('correct');
    else if(b===chosen) b.classList.add('wrong');
    else b.classList.add('dim');
    b.onclick=null;
  });
}
function chooseTimeUp(ans){
  if(answered) return;
  document.querySelectorAll('#opts .opt').forEach(b=>{
    if(b.textContent===ans) b.classList.add('correct'); else b.classList.add('dim');
    b.onclick=null;
  });
  resolve(false, null, ans, false);
}
/* Joker-Button für Schnellwahl/Abhören: streicht 2 falsche Optionen */
function jokerHTML(){
  return G.inv.joker>0 ? `<button class="btn alt mini" id="joker">🃏 Joker (${G.inv.joker})</button>` : '';
}
function wireJoker(correctTxt){
  const b=document.getElementById('joker'); if(!b) return;
  b.onclick=()=>{
    if(answered) return;
    G.inv.joker--; saveGame();
    const wrong = shuffle([...document.querySelectorAll('#opts .opt')].filter(o=>o.textContent!==correctTxt));
    wrong.slice(0,2).forEach(o=>{ o.classList.add('dim'); o.onclick=null; });
    S.click(); b.remove();
  };
}

/* ============================================================
   LERNMETHODE 1 — Schnellwahl (Multiple Choice)
   ============================================================ */
function renderChoose(task){
  const v=byId(task.id), dir=task.dir;
  const targetKey = dir==='en2de' ? 'de':'en';
  const promptKey = dir==='en2de' ? 'en':'de';
  const pool = shuffle((M&&M.pool?M.pool:VOCAB).filter(x=>x.id!==task.id)).slice(0,3);
  const options = shuffle([v[targetKey], ...pool.map(x=>x[targetKey])]);
  const pf=LANGMETA[promptKey], af=LANGMETA[targetKey];
  screen.innerHTML = `
    <div class="center" style="max-width:580px">
      ${taskHeader('🎯 Schnellwahl')}
      <div id="timerWrap"><div id="timerBar"></div></div>
      <div class="panel" id="qpanel">
        <div class="qPrompt">${pf.flag} &nbsp;→&nbsp; ${af.flag}</div>
        <div class="qWord">${esc(v[promptKey])} <button class="speakBtn" style="position:static;font-size:20px" id="qspeak">🔊</button></div>
        <div class="qDir">Wähle die richtige Übersetzung:</div>
        <div class="options" id="opts">
          ${options.map((o,idx)=>`<button class="opt" data-i="${idx}">${esc(o)}</button>`).join('')}
        </div>
        ${jokerHTML()}
        <div class="feedback" id="fb"></div>
      </div>
    </div>`;
  document.getElementById('qspeak').onclick=()=>speak(v[promptKey], pf.code);
  wireJoker(v[targetKey]);
  document.querySelectorAll('#opts .opt').forEach(b=>{
    b.onclick=()=>{
      if(answered) return;
      const ok = b.textContent===v[targetKey];
      lockChoose(v[targetKey], b);
      if(ok) speak(v[targetKey], af.code);
      resolve(ok, b, v[targetKey], timeLeft>TIME_MAX*0.5);
    };
  });
  startTimer(()=> chooseTimeUp(v[targetKey]));
}

/* ============================================================
   LERNMETHODE 2 — Abhören (Listening)
   ============================================================ */
function renderListen(task){
  const v=byId(task.id), heard=task.heardLang;
  const optKey = heard==='en' ? 'de':'en';
  const pool = shuffle((M&&M.pool?M.pool:VOCAB).filter(x=>x.id!==task.id)).slice(0,3);
  const options = shuffle([v[optKey], ...pool.map(x=>x[optKey])]);
  const hm=LANGMETA[heard], af=LANGMETA[optKey];
  screen.innerHTML = `
    <div class="center" style="max-width:560px">
      ${taskHeader('🎧 Abhören')}
      <div id="timerWrap"><div id="timerBar"></div></div>
      <div class="panel" id="qpanel">
        <div class="qPrompt">🎧 Hör genau hin (${hm.short}) &nbsp;→&nbsp; wähle ${af.flag}</div>
        <div class="listenBig">🎧</div>
        <button class="btn alt" id="play">▶︎ Anruf abhören</button>
        <div class="qDir" style="margin-top:14px">Was wurde gesagt?</div>
        <div class="options" id="opts">
          ${options.map((o,idx)=>`<button class="opt" data-i="${idx}">${esc(o)}</button>`).join('')}
        </div>
        ${jokerHTML()}
        <div class="feedback" id="fb"></div>
      </div>
    </div>`;
  const sp=()=>{ speak(v[heard], hm.code); };
  document.getElementById('play').onclick=sp;
  setTimeout(sp, 350);
  wireJoker(v[optKey]);
  document.querySelectorAll('#opts .opt').forEach(b=>{
    b.onclick=()=>{
      if(answered) return;
      const ok=b.textContent===v[optKey];
      lockChoose(v[optKey], b);
      if(ok) speak(v[optKey], af.code);
      resolve(ok, b, v[optKey], timeLeft>TIME_MAX*0.5);
    };
  });
  startTimer(()=> chooseTimeUp(v[optKey]));
}

/* ============================================================
   LERNMETHODE 3 — Satz-Puzzle (Wörter/Buchstaben ordnen)
   ============================================================ */
function renderScramble(task){
  const v=byId(task.id), produce=task.produce, other= produce==='en'?'de':'en';
  const target=canonical(v[produce]);
  const pf=LANGMETA[other], af=LANGMETA[produce];
  const isPhrase=/\s/.test(target);
  const tokens = isPhrase ? target.split(/\s+/) : target.split('');
  let bank = shuffle(tokens.map((t,idx)=>({t,idx})));
  if(tokens.length>1 && bank.map(o=>o.t).join('|')===tokens.join('|')) bank=shuffle(bank); // nicht schon gelöst starten
  let chosen=[];
  screen.innerHTML = `
    <div class="center" style="max-width:580px">
      ${taskHeader('🧩 Satz-Puzzle')}
      <div class="panel">
        <div class="qPrompt">${pf.flag} &nbsp;→&nbsp; ${af.flag}</div>
        <div class="qWord" style="font-size:20px">${esc(v[other])} <button class="speakBtn" style="position:static;font-size:18px" id="psp">🔊</button></div>
        <div class="qDir">Setze die ${isPhrase?'Wörter':'Buchstaben'} in die richtige Reihenfolge (${af.short}):</div>
        <div class="answerLine" id="ans"></div>
        <div class="chips" id="bank"></div>
        <div class="rowBtns">
          <button class="btn alt mini" id="reset">↺ Reset</button>
          <button class="btn mini" id="check">✓ Prüfen</button>
        </div>
        <div class="feedback" id="fb"></div>
      </div>
    </div>`;
  document.getElementById('psp').onclick=()=>speak(v[other], pf.code);
  function draw(){
    const ans=document.getElementById('ans'), bk=document.getElementById('bank');
    ans.innerHTML = chosen.length
      ? chosen.map((bi,pos)=>`<span class="chip in" data-pos="${pos}">${esc(bank[bi].t)}</span>`).join('')
      : '<span class="ph">tippe unten die Bausteine an…</span>';
    bk.innerHTML = bank.map((o,bi)=> chosen.includes(bi)?'':`<span class="chip" data-bi="${bi}">${esc(o.t)}</span>`).join('') || '<span class="ph">—</span>';
    ans.querySelectorAll('.chip.in').forEach(ch=> ch.onclick=()=>{ if(answered)return; chosen.splice(+ch.dataset.pos,1); S.click(); draw(); });
    bk.querySelectorAll('.chip').forEach(ch=> ch.onclick=()=>{ if(answered)return; chosen.push(+ch.dataset.bi); S.flip(); draw(); });
  }
  draw();
  document.getElementById('reset').onclick=()=>{ if(answered)return; chosen=[]; S.click(); draw(); };
  document.getElementById('check').onclick=()=>{
    if(answered) return;
    const assembled = chosen.map(bi=>bank[bi].t).join(isPhrase?' ':'');
    const ok = norm(assembled)===norm(target);
    if(ok) speak(target, af.code);
    resolve(ok, document.getElementById('check'), target, false);
  };
}

/* ============================================================
   LERNMETHODE 4 — Funkspruch (Tippen)
   ============================================================ */
function renderType(task){
  const v=byId(task.id), produce=task.produce, other= produce==='en'?'de':'en';
  const pf=LANGMETA[other], af=LANGMETA[produce];
  const target=v[produce];
  const alts = target.split('/').map(s=>norm(s)).filter(Boolean);
  const sol = canonical(target);
  let hintN=0;
  screen.innerHTML = `
    <div class="center" style="max-width:560px">
      ${taskHeader('⌨️ Funkspruch')}
      <div class="panel">
        <div class="qPrompt">${pf.flag} &nbsp;→&nbsp; ${af.flag}</div>
        <div class="qWord" style="font-size:20px">${esc(v[other])} <button class="speakBtn" style="position:static;font-size:18px" id="psp">🔊</button></div>
        <div class="qDir">Tippe die Übersetzung (${af.short}):</div>
        <input class="tin" id="tin" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Antwort eingeben…" />
        <div class="hintRow">
          <button class="btn alt mini" id="hint">💡 Tipp</button>
          <button class="btn ghost mini" id="give">🏳️ Auflösen</button>
          <button class="btn mini" id="check">✓ Senden</button>
        </div>
        <div class="feedback" id="fb"></div>
      </div>
    </div>`;
  const inp=document.getElementById('tin'); setTimeout(()=>{ try{inp.focus();}catch(e){} },60);
  document.getElementById('psp').onclick=()=>speak(v[other], pf.code);
  function check(){
    if(answered) return;
    const val=norm(inp.value);
    if(!val){ try{inp.focus();}catch(e){} return; }
    const ok = alts.some(a=> val===a || lev(val,a) <= (a.length<=6?1:2));
    if(ok) speak(sol, af.code);
    resolve(ok, document.getElementById('check'), sol, false);
    inp.disabled=true;
  }
  document.getElementById('check').onclick=check;
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); check(); } });
  document.getElementById('hint').onclick=()=>{
    if(answered) return;
    hintN = Math.min(sol.length, hintN + (/\s/.test(sol)?2:1));
    inp.value = sol.slice(0,hintN); try{inp.focus();}catch(e){} S.click();
  };
  document.getElementById('give').onclick=()=>{
    if(answered) return;
    resolve(false, document.getElementById('check'), sol, false);
    inp.disabled=true;
  };
}

/* ============================================================
   LERNMETHODE 5 — Code-Memory (Paare finden)
   ============================================================ */
function renderMemory(task){
  const ids=task.ids;
  let cards=[];
  ids.forEach(id=>{ cards.push({id,t:byId(id).en,l:'en'}); cards.push({id,t:byId(id).de,l:'de'}); });
  cards=shuffle(cards);
  let first=null, lock=false, matched=0;
  screen.innerHTML = `
    <div class="center" style="max-width:620px">
      ${taskHeader('🧠 Code-Memory')}
      <div class="qDir" style="text-align:center">Finde die ${ids.length} Paare: 🇬🇧 Englisch ↔ 🇩🇪 Deutsch.</div>
      <div class="memGrid" id="mem">
        ${cards.map((c,i)=>`<div class="memCard down" data-i="${i}">❓</div>`).join('')}
      </div>
      <div class="feedback" id="fb" style="text-align:center"></div>
    </div>`;
  const grid=document.getElementById('mem');
  const elOf=i=>grid.querySelector('.memCard[data-i="'+i+'"]');
  function reveal(i){ const el=elOf(i); el.classList.remove('down'); el.classList.add('face'); el.textContent=cards[i].t; }
  function hide(i){ const el=elOf(i); el.classList.add('down'); el.classList.remove('face'); el.textContent='❓'; }
  grid.querySelectorAll('.memCard').forEach(el=>{
    el.onclick=()=>{
      if(lock) return;
      const i=+el.dataset.i;
      if(el.classList.contains('matched')||el.classList.contains('face')) return;
      reveal(i); S.flip();
      if(first===null){ first=i; return; }
      if(first!==i && cards[first].id===cards[i].id){
        elOf(first).classList.add('matched'); el.classList.add('matched');
        first=null; matched++;
        recordReview(cards[i].id, true, false);
        registerCorrect(el, false);
        const fb=document.getElementById('fb'); if(fb) fb.innerHTML=`<span style="color:var(--good)">✅ Paar gefunden! (${matched}/${ids.length})</span>`;
        if(matched===ids.length){ S.win(); burst(innerWidth/2, innerHeight*0.4, 60); advance(900); }
      } else {
        lock=true; const fi=first; first=null;
        M.streak=0; S.wrong(); updateHUD();
        const fb=document.getElementById('fb'); if(fb) fb.innerHTML=`<span style="color:var(--bad)">❌ Kein Paar</span>`;
        setTimeout(()=>{ hide(fi); hide(i); lock=false; }, 750);
      }
    };
  });
}

/* ============================================================
   TRAINING-ENGINE (freies Üben)
   ============================================================ */
function startTraining(method, custom){
  const pool = custom ? G.custom : VOCAB;
  M = { training:true, method, lives:1, maxLives:1, streak:0, correct:0, solved:0, mistakes:0, m:null, lastId:null,
        pool, poolIds: pool.map(v=>v.id), custom:!!custom };
  hud.style.display='flex'; updateHUD();
  trainNext();
}
/* Memory-Karten: bevorzugt die schwächsten Codes */
function pickMemoryIds(n, ids){
  ids = ids || VOCAB.map(v=>v.id);
  const now=Date.now();
  const sorted = ids.slice().sort((a,b)=>cardScore(b,now)-cardScore(a,now));
  return shuffle(sorted.slice(0, Math.min(ids.length, n+2))).slice(0,n);
}
function trainNext(){
  if(!M) return;
  let method = M.method;
  let pool = null;                               // null = alle Codes (SRS-gewichtet)
  if(method==='review'){                          // 🩺 gemischte Methoden, schwache Codes
    pool = weakPool(M.poolIds); if(pool.length<3) pool = M.poolIds.slice();
    method = shuffle(['choose','listen','scramble','type'])[0];
  }
  let task;
  if(method==='memory'){
    task = {method:'memory', ids: pickMemoryIds(Math.min(6, M.poolIds.length), M.poolIds)};
  } else {
    const id = pickReviewId(pool || M.poolIds, M.lastId); M.lastId = id;
    switch(method){
      case 'choose':   task={method:'choose', id, dir: Math.random()<.5?'en2de':'de2en'}; break;
      case 'listen':   task={method:'listen', id, heardLang: Math.random()<.5?'en':'de'}; break;
      case 'scramble': task={method:'scramble', id, produce: Math.random()<.5?'en':'de'}; break;
      case 'type':     task={method:'type', id, produce: Math.random()<.5?'de':'en'}; break;
      default:         task={method:'choose', id, dir:'en2de'};
    }
  }
  renderTask(task);
}

/* ============================================================
   ABSCHLUSS-SCREENS
   ============================================================ */
function missionDebrief(){
  clearInterval(timerInt);
  showDialogue(M.m.outro, ()=> missionComplete());
}

function missionComplete(){
  clearInterval(timerInt);
  const i=M.i, last=i===MISSIONS.length-1;
  if(i+1>=G.unlocked && !last) G.unlocked=i+2;
  if(last) G.unlocked=Math.max(G.unlocked, MISSIONS.length+1);
  if(M.m.badge && !G.badges.includes(M.m.badge)) G.badges.push(M.m.badge);
  if(M.mistakes===0 && !G.perfectMissions.includes(i)) G.perfectMissions.push(i);
  const pct = Math.round((M.correct/Math.max(1,M.total))*100);
  const stars = pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  const bonus = 40 + i*20; awardCoins(bonus);
  saveGame(); checkAchievements();
  S.win(); burst(innerWidth/2, innerHeight*0.35, 80);
  const earnedBadge = M.m.badge;
  screen.innerHTML = `
    <div class="center">
      <div style="font-size:60px" class="pulse">${last?'🏆':'🎉'}</div>
      <h1 class="title" style="font-size:28px">${last?'OPERATION GESCHAFFT!':'Mission gemeistert!'}</h1>
      <div class="panel">
        <div class="ranklabel">${stars}</div>
        <div class="statRow">
          <div class="stat"><b>${M.correct}/${M.total}</b><small>gelöst</small></div>
          <div class="stat"><b>${pct}%</b><small>Trefferquote</small></div>
          <div class="stat"><b>🔥 ${G.bestStreak}</b><small>beste Combo</small></div>
        </div>
        <div class="badgeRow"><span class="bChip">🏅 ${esc(earnedBadge)}</span><span class="bChip">+${bonus} 🪙 Bonus</span></div>
        <p class="story" style="text-align:center">${last
          ? 'Der Schakal ist enttarnt! Du beherrschst alle 22 Telefon-Codes. Rang: <b style="color:var(--gold)">'+rankFor(G.level)+'</b> 🕵️'
          : 'Nächste Mission freigeschaltet! Weiter so, Agent.'}</p>
        ${last
          ? '<button class="btn" id="trainBtn">🎯 Weiter trainieren</button>'
          : '<button class="btn" id="nextBtn">➡️ Nächste Mission</button>'}
        <button class="btn ghost" id="mapBtn">🗺️ Zur Missions-Karte</button>
      </div>
    </div>`;
  M=null;
  if(last){
    document.getElementById('trainBtn').onclick=()=>{ S.click(); showTraining(); };
  } else {
    document.getElementById('nextBtn').onclick=()=>{ S.click(); showBriefing(i+1); };
  }
  document.getElementById('mapBtn').onclick=()=>{ S.click(); showMap(); };
}

function missionFailed(){
  clearInterval(timerInt); S.fail();
  const i=M.i, correct=M.correct;
  M=null;
  screen.innerHTML = `
    <div class="center">
      <div style="font-size:60px">📵</div>
      <h1 class="title" style="font-size:26px">Verbindung verloren!</h1>
      <div class="panel">
        <p class="story" style="text-align:center">Keine Leben mehr – aber jede*r gute Agent*in versucht es nochmal.
        Du hattest <b>${correct}</b> richtige Anrufe. Schau dir kurz das Briefing an und schlag erneut zu!</p>
        <button class="btn" id="retryBtn">🔁 Mission wiederholen</button>
        <button class="btn ghost" id="briefBtn">🃏 Erst Briefing ansehen</button>
        <button class="btn ghost" id="mapBtn">🗺️ Zur Missions-Karte</button>
      </div>
    </div>`;
  document.getElementById('retryBtn').onclick=()=>{ S.click(); startMission(i); };
  document.getElementById('briefBtn').onclick=()=>{ S.click(); showFlashcards(i); };
  document.getElementById('mapBtn').onclick=()=>{ S.click(); showMap(); };
}
